<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netbook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="logo">
        <h2>Netbook</h2>
      </div>

      <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Community</a>
        <a href="#">Blog</a>
        <a href="#">Events</a>
      </nav>

      <div class="search">
        <input type="text" placeholder="Search Here...">

  <section class="hero">

      <div class="hero-text">
        <span class="badge">Netbook community</span>

        </h1>

        <p>

        <div class="buttons">
          <button class="btn blue">About More</button>
          <button class="btn white">Invite Friend</button>
        </div>
      </div>

      <div class="hero-image">
        <img src="/Iamge.png" alt="">

    </div>
